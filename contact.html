<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIBI TECH - Contact</title>
<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: 'Poppins', sans-serif;
  line-height: 1.6;
}

header, footer {
  background: #020617;
  padding: 20px;
  text-align: center;
}

header h2 {
  margin: 0 0 10px 0;
  font-size: 2rem;
}

nav a {
  color: white;
  text-decoration: none;
  margin: 0 15px;
  font-weight: 500;
  transition: color 0.3s ease;
}

nav a:hover {
  color: #4f46e5;
}

.section {
  padding: 100px 10%;
  text-align: center;
}

.section h2 {
  font-size: 2rem;
  margin-bottom: 20px;
}

.contact-info {
  margin-bottom: 40px;
  font-size: 1.1rem;
}

.contact-info p {
  margin: 5px 0;
}

form {
  max-width: 500px;
  margin: auto;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border: none;
  border-radius: 10px;
  background: #1e293b;
  color: white;
  font-size: 1rem;
}

input::placeholder, textarea::placeholder {
  color: #cbd5e1;
}

button {
  padding: 12px 25px;
  border: none;
  border-radius: 50px;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  transition: 0.4s;
  font-size: 1rem;
  margin-top: 10px;
}

button:hover {
  background: #06b6d4;
  transform: scale(1.1);
}

footer {
  font-size: 0.9rem;
  margin-top: 40px;
}

@media (max-width: 768px) {
  nav a {
    display: block;
    margin: 10px 0;
  }
}
</style>
</head>
<body>

<header>
  <h2>FIBI TECH</h2>
  <nav>
    <a href="index.html">Accueil</a>
    <a href="services.html">Services</a>
    <a href="apropos.html">À propos</a>
    <a href="portfolio.html">Réalisations</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="section">
  <h2>Contactez-nous</h2>

  <div class="contact-info">
    <p>Téléphone : 0159958395</p>
    <p>Téléphone : 0147854264</p>
    <p>Email : contact@fibi-tech.com</p>
  </div>

  <form>
    <input type="text" placeholder="Votre nom" required>
    <input type="email" placeholder="Votre email" required>
    <textarea rows="5" placeholder="Votre message" required></textarea>
    <button type="submit">Envoyer</button>
  </form>
</section>

<footer>© 2026 FIBI TECH - Tous droits réservés</footer>

</body>
</html>
